name: CI
on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.5"]
        symfony: ["5.4.*", "6.4.*", "6.4wApi", "7.4.*", "8.0.*"]
        exclude:
          - php: "8.2"
            symfony: "8.0.*"

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: ctype, iconv, intl, json, mbstring, pdo, pdo_sqlite
          coverage: none
          ini-values: register_argc_argv=1

      - name: Resolve Symfony refs
        run: |
          symfony='${{ matrix.symfony }}'
          [[ "$symfony" == *'*' ]] && SF_REF="${symfony%.*}" || SF_REF="$symfony"
          [[ "$symfony" == "6.4wApi" ]] && COMP_SYMFONY="6.4.*" || COMP_SYMFONY="$symfony"

          if [[ '${{ matrix.php }}' == '8.2' ]]; then
            PHPUNIT_REQ="^11.0"
          else
            PHPUNIT_REQ="^12.0"
          fi

          {
            echo "SF_REF=$SF_REF"
            echo "COMP_SYMFONY=$COMP_SYMFONY"
            echo "PHPUNIT_REQ=$PHPUNIT_REQ"
          } >> "$GITHUB_ENV"

      - name: Checkout Symfony ${{ env.SF_REF }} sample
        uses: actions/checkout@v6
        with:
          repository: Codeception/symfony-module-tests
          path: framework-tests
          ref: ${{ env.SF_REF }}

      - id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          sed -i 's/\^5.4 | \^6.4 | \^7.4 | \^8.0/${{ env.COMP_SYMFONY }}/g' composer.json

          if [[ "${{ env.COMP_SYMFONY }}" == "5.4.*" ]]; then
            composer remove --no-update symfony/clock || true
          else
            sed -i 's/\^6.4 | \^7.4 | \^8.0/${{ env.COMP_SYMFONY }}/g' composer.json
          fi

          if [[ "${{ env.COMP_SYMFONY }}" == "5.4.*" ]]; then
            sed -i 's/"doctrine\/orm": "\^3.6"/"doctrine\/orm": "^2.14"/g' composer.json
          fi

          composer require --no-update \
            phpunit/phpunit:${{ env.PHPUNIT_REQ }} \
            vlucas/phpdotenv \
            codeception/module-asserts:"3.*" \
            codeception/module-doctrine:"3.*"

          if [[ '${{ matrix.symfony }}' == "6.4wApi" ]]; then
            composer require --no-update codeception/module-rest:"3.*"
          fi

          composer update --prefer-dist --no-progress -w

      - name: Quality checks (latest Symfony only)
        if: ${{ matrix.symfony == '8.0.*' }}
        run: |
          composer phpstan
          composer cs-check
          composer audit

      - name: Run module tests
        run: vendor/bin/phpunit tests

      - name: Prepare Symfony sample
        working-directory: framework-tests
        run: |
          composer validate --strict
          composer config platform.php --unset
          composer require --no-update phpunit/phpunit:${{ env.PHPUNIT_REQ }}
          composer remove --no-update \
            codeception/codeception \
            codeception/module-asserts \
            codeception/module-doctrine \
            codeception/lib-innerbrowser \
            codeception/module-symfony
          composer update --no-progress -W

      - name: Setup Database
        working-directory: framework-tests
        run: |
          php bin/console doctrine:schema:update --force
          php bin/console doctrine:fixtures:load --quiet

      - name: Generate JWT keypair
        if: ${{ matrix.symfony == '6.4wApi' }}
        working-directory: framework-tests
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Run tests
        run: |
          php vendor/bin/codecept build -c framework-tests
          php vendor/bin/codecept run Functional -c framework-tests
